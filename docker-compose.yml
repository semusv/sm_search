version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sap-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sap_rag}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  search:
    build:
      context: .
      dockerfile: Dockerfile.search
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  vectorizer:
    build:
      context: .
      dockerfile: Dockerfile.vectorizer
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8001:8001"

volumes:
  pg_data:
